services:
  # ─────────────────────────────────────────────
  # Backend — Node.js Express API
  # ─────────────────────────────────────────────
  - type: web
    name: manivtha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false           # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true   # Auto-generated secure value
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false           # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false           # Set to your Render static site URL after deploying frontend

  # ─────────────────────────────────────────────
  # Frontend — Vite React Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: manivtha-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # Set to your backend URL e.g. https://manivtha-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # React Router SPA fallback
